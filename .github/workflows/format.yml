name: Full format backfill
on:
  workflow_dispatch:

jobs:
  format-full:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Full table format (write DB)
        run: SJKX_FORMAT_MODE=full bash scripts/run_format_job.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          PRODUCT_FORMAT_USE_LLM: ${{ secrets.PRODUCT_FORMAT_USE_LLM }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
