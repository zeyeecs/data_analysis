name: Daily pipeline
on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Import + format reconcile
        run: bash scripts/run_server_pipeline.sh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_API_BASE: ${{ secrets.FEISHU_API_BASE }}
          FEISHU_FOLDER_F: ${{ secrets.FEISHU_FOLDER_F }}
          FEISHU_FOLDER_R: ${{ secrets.FEISHU_FOLDER_R }}
          FEISHU_FOLDER_V: ${{ secrets.FEISHU_FOLDER_V }}
          FEISHU_FOLDER_F_SOURCE: ${{ secrets.FEISHU_FOLDER_F_SOURCE }}
          FEISHU_FOLDER_R_SOURCE: ${{ secrets.FEISHU_FOLDER_R_SOURCE }}
          FEISHU_FOLDER_V_SOURCE: ${{ secrets.FEISHU_FOLDER_V_SOURCE }}
          PRODUCT_FORMAT_USE_LLM: ${{ secrets.PRODUCT_FORMAT_USE_LLM }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_BASE_URL: ${{ secrets.OPENAI_BASE_URL }}
          OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}
